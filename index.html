<body>
  <div class="desk">

    <!-- LEFT: Closed book cover -->
    <section class="cover-book" aria-label="Portfolio cover">
      <div class="cover-spine">Portfolio</div>
      <div class="cover-front">
        <div class="cover-badge">Marketing Portfolio</div>
        <h1 class="cover-name">Emerald Mills</h1>
        <p class="cover-sub">Eastern Michigan University • 2026</p>
      </div>
    </section>

    <!-- RIGHT: Open flipbook -->
    <section class="open-book">
      <div id="flipbook">
        <div class="page">
          <h2>About Me</h2>
          <p>Write 3–5 lines about you…</p>
        </div>
        <div class="page">
          <h2>Projects</h2>
          <p>Project 1…</p>
        </div>
        <div class="page">
          <h2>Resume</h2>
          <p>Put your resume highlights…</p>
        </div>
        <div class="page">
          <h2>Contact</h2>
          <p>Email / LinkedIn…</p>
        </div>
      </div>

      <div class="controls">
        <button id="prevBtn" type="button">Back</button>
        <button id="nextBtn" type="button">Next</button>
      </div>
    </section>

  </div>

  <!-- scripts -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

  <script>
    $("#flipbook").turn({
      width: 900,
      height: 560,
      autoCenter: true
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      $("#flipbook").turn("next");
    });
    document.getElementById("prevBtn").addEventListener("click", () => {
      $("#flipbook").turn("previous");
    });
  </script>
</body>
